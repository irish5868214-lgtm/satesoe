<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valentine Website 💜</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* ပန်းရောင်အစား ခရမ်းနုနှင့် အပြာနုရောင် စပ်ထားသည် */
      background: linear-gradient(135deg, #e0c3fc, #8ec5fc, #c2e9fb);
      overflow: hidden;
    }

    .card {
      background: rgba(255, 255, 255, 0.8);
      padding: 35px 25px;
      border-radius: 25px;
      text-align: center;
      /* ခရမ်းရောင် Shadow */
      box-shadow: 0 10px 30px rgba(103, 58, 183, 0.2);
      width: 90%;
      max-width: 420px;
      position: relative;
      backdrop-filter: blur(10px);
      border: 2px solid rgba(142, 197, 252, 0.3);
      z-index: 10;
    }

    h1 {
      font-size: 2.2rem;
      color: #673ab7; /* Deep Purple */
      margin-bottom: 15px;
      text-shadow: 0 2px 10px rgba(103, 58, 183, 0.2);
    }

    p {
      color: #512da8;
      margin-bottom: 20px;
      font-size: 1.05rem;
    }

    .gif {
      width: 170px;
      height: 170px;
      object-fit: cover;
      border-radius: 18px;
      border: 3px solid #b39ddb;
      box-shadow: 0 10px 25px rgba(103, 58, 183, 0.2);
      margin-bottom: 20px;
    }

    .buttons {
      margin-top: 15px;
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    button {
      padding: 12px 22px;
      font-size: 1.05rem;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s ease;
      font-weight: 600;
    }

    #yesBtn {
      background: #673ab7;
      color: white;
      box-shadow: 0 10px 20px rgba(103, 58, 183, 0.3);
    }

    #noBtn {
      background: #ffffff;
      color: #673ab7;
      border: 2px solid #673ab7;
      position: absolute;
      left: 55%;
      top: 78%;
    }

    .loveText-container {
      margin-top: 20px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: pop 0.5s ease;
    }

    .loveText {
      font-size: 1.2rem;
      font-weight: bold;
      color: #512da8;
    }

    .next-arrow {
      background: #673ab7;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.5rem;
      text-decoration: none;
    }

    /* Second Page Styling */
    #secondPage {
      display: none;
      text-align: center;
      animation: fadeIn 1s ease;
      z-index: 20;
    }

    .heart-note {
      position: relative;
      width: 200px;
      height: 200px;
      background-color: white;
      transform: rotate(-45deg);
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      animation: heartPop 0.8s ease-out;
    }

    .heart-note::before,
    .heart-note::after {
      content: "";
      position: absolute;
      width: 200px;
      height: 200px;
      background-color: white;
      border-radius: 50%;
    }

    .heart-note::before { top: -100px; left: 0; }
    .heart-note::after { left: 100px; top: 0; }

    .ily-text {
      padding: 10px;
      text-align: center;
      position: absolute;
      transform: rotate(45deg);
      font-size: 20px;
      font-weight: bold;
      color: #673ab7;
      z-index: 5;
      line-height: 1.4;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes heartPop {
      0% { transform: rotate(-45deg) scale(0); }
      80% { transform: rotate(-45deg) scale(1.1); }
      100% { transform: rotate(-45deg) scale(1); }
    }

    .heart {
      position: absolute;
      font-size: 22px;
      animation: float 6s linear infinite;
      opacity: 0.8;
      z-index: 1;
    }

    @keyframes float {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-110vh) scale(1.6); opacity: 0; }
    }
  </style>
</head>


  <div class="card" id="firstPage">
    <h1>Love U💜 </h1>
    <p>ဘေဘီဆီပြန်လာချင်လား🥺</p>

     <img class="gif" src="y.gif" alt="Valentine Gif" onerror="this.src='https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpndWp3ZzZueW54bm93YXpueGZ4bm93YXpueGZ4bm93YXpueGZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/K75S6LzTMBmR8OtcW7/giphy.gif'"/>


    <div class="buttons">
      <button id="yesBtn">Yessss💜 </button>
    </div>

    <button id="noBtn">Nooooo🥺</button>

    <div class="loveText-container" id="loveAction">
      <span class="loveText">ဘေဘီတို့ပြန်တွဲကြရအောင်နော်</span>
      <div class="next-arrow" onclick="goToNextPage()">➔</div>
    </div>
  </div>

  <div id="secondPage">
    <div class="heart-note">
      <div class="ily-text">ဘေဘီအမှားတွေကို ခွင့်လွှတ်ပေးပြီး အသစ်ကပြန်စကြရအောင်နော်🥺</div>
    </div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const loveAction = document.getElementById("loveAction");
    const firstPage = document.getElementById("firstPage");
    const secondPage = document.getElementById("secondPage");

    yesBtn.addEventListener("click", () => {
      loveAction.style.display = "flex";
      noBtn.style.display = "none";
    });

    function goToNextPage() {
      firstPage.style.display = "none";
      secondPage.style.display = "flex";
      secondPage.style.justifyContent = "center";
      secondPage.style.alignItems = "center";
    }

    function moveNoButton() {
      const card = document.querySelector(".card");
      const cardRect = card.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = cardRect.width - btnRect.width - 20;
      const maxY = cardRect.height - btnRect.height - 20;

      let randomX = Math.floor(Math.random() * maxX);
      let randomY = Math.floor(Math.random() * maxY);

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        moveNoButton();
    });

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
     
      const heartTypes = ["💜", "✨", "☁️", "🤍"];
      heart.innerHTML = heartTypes[Math.floor(Math.random() * heartTypes.length)];
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.bottom = "-20px";
      heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
      document.body.appendChild(heart);
      setTimeout(() => { heart.remove(); }, 6000);
    }

    setInterval(createHeart, 500);
  </script>
</body>
</html>
